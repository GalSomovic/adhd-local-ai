name: build-bot
on:
  push:
    branches: [main]
    paths:
      - "bot/**"
      - ".github/workflows/build-bot.yml"
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: bot
          push: true
          tags: |
            ghcr.io/galsomovic/adhd-local-ai-bot:latest
            ghcr.io/galsomovic/adhd-local-ai-bot:${{ github.sha }}
