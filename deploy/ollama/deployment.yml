apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          env:
            - name: OLLAMA_KEEP_ALIVE
              value: 10m
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
            - name: OLLAMA_MAX_LOADED_MODELS
              value: "1"
            - name: OLLAMA_CONTEXT_LENGTH
              value: "8192"
          ports:
            - containerPort: 11434
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "5"
              memory: 7Gi
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
      volumes:
        - name: models
          hostPath:
            path: /var/lib/assistant/ollama
            type: DirectoryOrCreate
